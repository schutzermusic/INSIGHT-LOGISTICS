  <!-- Pre-hydration theme + motion init. Runs before React mounts, before
       any paint, so the first frame is already in the right theme and
       motion attribute selectors resolve correctly (no FOUC, no motion
       flash). Kept as a blocking inline script on purpose. -->
  <script>
    (function () {
      var root = document.documentElement;
      try {
        var storedTheme = localStorage.getItem('insight.theme');
        var mode = (storedTheme === 'light' || storedTheme === 'dark' || storedTheme === 'system') ? storedTheme : 'system';
        var resolved = mode === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : mode;
        if (resolved === 'dark') root.classList.add('dark');
        root.style.colorScheme = resolved;
        root.setAttribute('data-theme', resolved);
      } catch (_) {
        root.classList.add('dark');
        root.style.colorScheme = 'dark';
      }
      try {
        var storedMotion = localStorage.getItem('insight.motion');
        var motionPref = (storedMotion === 'full' || storedMotion === 'reduced' || storedMotion === 'off' || storedMotion === 'system')
          ? storedMotion
          : 'system';
        var motionResolved = motionPref;
        if (motionPref === 'system') {
          motionResolved = (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) ? 'reduced' : 'full';
        }
        root.setAttribute('data-motion', motionResolved);
      } catch (_) {
        root.setAttribute('data-motion', 'full');
      }
    })();
  </script>
