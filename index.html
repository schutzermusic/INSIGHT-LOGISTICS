  <!-- Pre-hydration theme init. Runs before React mounts, before any
       paint, so the first frame is already in the right theme.
       No FOUC / hydration flash. Kept as a blocking inline script
       on purpose. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('insight.theme');
        var mode = (stored === 'light' || stored === 'dark' || stored === 'system') ? stored : 'system';
        var resolved = mode === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : mode;
        var root = document.documentElement;
        if (resolved === 'dark') root.classList.add('dark');
        root.style.colorScheme = resolved;
        root.setAttribute('data-theme', resolved);
      } catch (_) {
        // Fallback to dark (matches current default).
        document.documentElement.classList.add('dark');
        document.documentElement.style.colorScheme = 'dark';
      }
    })();
  </script>
